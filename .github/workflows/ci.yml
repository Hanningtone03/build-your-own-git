name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Syntax check
        run: python -m py_compile src/repository.py src/objects.py src/index.py src/commits.py src/diff.py src/cli.py
      - name: Test init and commit
        run: |
          mkdir testrepo && cd testrepo
          python -m ../src.cli init
          echo "hello" > test.txt
          python -m ../src.cli add test.txt
          python -m ../src.cli commit "test commit"
          python -m ../src.cli log